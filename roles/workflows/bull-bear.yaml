name: bull-bear
description: 标准牛熊对抗分析 — 技术面多空双方分析后互相审阅，裁判综合裁决
version: "1.0"

nodes:
  - id: bull_init
    agent: tech-analyst
    prompt: |
      从技术面看多 {{target}}。
      关注均线多头排列、MACD金叉、放量突破等做多信号。
      给出3条核心理由。

  - id: bear_init
    agent: tech-analyst
    prompt: |
      从技术面看空 {{target}}。
      关注死叉、破位、顶背离、缩量等做空信号。
      给出3条核心理由。

  - id: judge
    agent: judge
    depends_on: [bull_init, bear_init]
    prompt: |
      综合双方技术面分析，对 {{target}} 做出最终研判。

      多方论据：{{state.bull_init}}
      空方论据：{{state.bear_init}}

      请给出操作建议和关键价位。
